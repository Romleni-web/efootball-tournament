<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments - eFootball League</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">eFootball<span class="highlight">Pro</span></span>
            </div>
        </div>
        
        <!-- Desktop Nav -->
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
        </ul>
        
        <!-- Mobile Hamburger -->
        <button class="mobile-menu-toggle" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- Mobile Navigation Overlay -->
    <div class="mobile-nav" id="mobileNav" onclick="closeMobileMenu()"></div>

    <section class="section" style="margin-top: 6rem;">
        <div class="container">
            <h1 class="section-title">All Tournaments</h1>
            
            <!-- Login Prompt for non-authenticated users -->
            <div id="loginPrompt" class="tournament-card" style="margin-bottom: 2rem; display: none;">
                <h3 style="color: var(--primary); margin-bottom: 0.5rem;">🔒 Login Required</h3>
                <p style="color: var(--text-muted); margin-bottom: 1rem;">You need an account to join tournaments and compete for prizes.</p>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <a href="login.html" class="btn btn-primary">Login</a>
                    <a href="register.html" class="btn btn-outline">Create Account</a>
                </div>
            </div>
            
            <div class="filter-bar" style="display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap;">
                <button class="btn btn-outline active" onclick="filterTournaments('all')" style="flex: 1; min-width: 80px;">All</button>
                <button class="btn btn-outline" onclick="filterTournaments('open')" style="flex: 1; min-width: 80px;">Open</button>
                <button class="btn btn-outline" onclick="filterTournaments('ongoing')" style="flex: 1; min-width: 80px;">Ongoing</button>
                <button class="btn btn-outline" onclick="filterTournaments('finished')" style="flex: 1; min-width: 80px;">Finished</button>
            </div>
            
            <div class="tournament-grid" id="tournaments-list">
                <!-- Dynamically populated -->
            </div>
        </div>
    </section>

    <!-- Payment Modal (only shown when logged in) -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon">📱</div>
                <h2>M-Pesa Payment</h2>
                <p>Enter your M-Pesa number to pay entry fee</p>
            </div>
            
            <form id="paymentForm" onsubmit="initiatePayment(event)">
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="mpesaNumber" class="form-input" placeholder="2547XX XXX XXX" required>
                    <p class="form-hint">Format: 2547XXXXXXXX</p>
                </div>
                
                <div class="tournament-summary" style="background: var(--darker); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                    <p><strong>Tournament:</strong> <span id="paymentTournamentName"></span></p>
                    <p><strong>Entry Fee:</strong> <span id="paymentAmount" style="color: var(--primary); font-size: 1.3rem;"></span></p>
                </div>
                
                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                    <span class="loading hidden" id="paymentLoading"></span>
                    <span id="paymentBtnText">Pay with M-Pesa</span>
                </button>
                
                <button type="button" class="btn btn-outline" style="width: 100%; margin-top: 0.5rem;" onclick="closePaymentModal()">
                    Cancel
                </button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/tournaments.js"></script>
    <script src="js/mpesa.js"></script>
    <script>
        let currentTournamentId = null;
        let isLoggedIn = false;

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            checkLoginStatus();
            loadAllTournaments();
        });

        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            isLoggedIn = !!token;
            
            // Show login prompt if not logged in
            const loginPrompt = document.getElementById('loginPrompt');
            if (loginPrompt) {
                loginPrompt.style.display = isLoggedIn ? 'none' : 'block';
            }
        }

        // Override createTournamentCard to check auth
        function createTournamentCard(tournament) {
            const isFull = tournament.registeredPlayers >= tournament.maxPlayers;
            const canJoin = tournament.status === 'open' && !isFull;
            
            // Determine button state based on auth
            let buttonHTML;
            if (!isLoggedIn) {
                buttonHTML = `
                    <button class="btn btn-outline" style="width: 100%;" onclick="redirectToLogin()">
                        Login to Join
                    </button>
                `;
            } else if (canJoin) {
                buttonHTML = `
                    <button class="btn btn-primary btn-large" style="width: 100%;" onclick="openPaymentModal('${tournament._id}', '${tournament.name}', ${tournament.entryFee})">
                        Join Tournament
                    </button>
                `;
            } else {
                buttonHTML = `
                    <button class="btn btn-outline" style="width: 100%;" disabled>
                        ${isFull ? 'Tournament Full' : 'Registration Closed'}
                    </button>
                `;
            }
            
            return `
                <div class="tournament-card" data-status="${tournament.status}">
                    <div class="tournament-header">
                        <h3 class="tournament-name">${tournament.name}</h3>
                        <span class="tournament-status status-${tournament.status}">${tournament.status}</span>
                    </div>
                    
                    <div class="tournament-details">
                        <div class="detail">
                            <span class="detail-label">Entry Fee</span>
                            <span class="detail-value">KES ${tournament.entryFee}</span>
                        </div>
                        <div class="detail">
                            <span class="detail-label">Prize Pool</span>
                            <span class="detail-value" style="color: var(--accent);">KES ${tournament.prizePool}</span>
                        </div>
                        <div class="detail">
                            <span class="detail-label">Players</span>
                            <span class="detail-value">${tournament.registeredPlayers}/${tournament.maxPlayers}</span>
                        </div>
                        <div class="detail">
                            <span class="detail-label">Format</span>
                            <span class="detail-value">${tournament.format || 'Single Elim'}</span>
                        </div>
                    </div>
                    
                    ${buttonHTML}
                </div>
            `;
        }

        function redirectToLogin() {
            sessionStorage.setItem('redirectAfterLogin', window.location.href);
            window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
        }

        async function loadAllTournaments() {
            try {
                const response = await fetch(`${API_URL}/tournaments`);
                const data = await response.json();
                
                const container = document.getElementById('tournaments-list');
                if (!container) return;
                
                if (data.tournaments && data.tournaments.length > 0) {
                    container.innerHTML = data.tournaments.map(t => createTournamentCard(t)).join('');
                } else {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">No tournaments available</p>';
                }
            } catch (error) {
                console.error('Error loading tournaments:', error);
                document.getElementById('tournaments-list').innerHTML = 
                    '<p style="text-align: center; color: #ff4444;">Failed to load tournaments</p>';
            }
        }

        function filterTournaments(status) {
            // Update active button
            document.querySelectorAll('.filter-bar button').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === status || (status === 'all' && btn.textContent === 'All')) {
                    btn.classList.add('active');
                }
            });
            
            // Filter cards
            const cards = document.querySelectorAll('.tournament-card');
            cards.forEach(card => {
                if (status === 'all' || card.dataset.status === status) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
