<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments - eFootball League</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">eFootball<span class="highlight">Pro</span></span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="tournaments.html" class="active">Tournaments</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
            <li class="auth-links">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="register.html" class="btn btn-primary">Register</a>
            </li>
        </ul>
        <div class="user-menu hidden">
            <span class="username"></span>
            <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <section class="section" style="margin-top: 6rem;">
        <div class="container">
            <h1 class="section-title">All Tournaments</h1>
            
            <div class="filter-bar" style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                <button class="btn btn-outline active" onclick="filterTournaments('all')">All</button>
                <button class="btn btn-outline" onclick="filterTournaments('open')">Open</button>
                <button class="btn btn-outline" onclick="filterTournaments('ongoing')">Ongoing</button>
                <button class="btn btn-outline" onclick="filterTournaments('finished')">Finished</button>
            </div>
            
            <div class="tournament-grid" id="tournaments-list">
                <!-- Dynamically populated -->
            </div>
        </div>
    </section>

    <!-- Payment Modal -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon">📱</div>
                <h2>M-Pesa Payment</h2>
                <p>Enter your M-Pesa number to pay entry fee</p>
            </div>
            
            <form id="paymentForm" onsubmit="initiatePayment(event)">
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="mpesaNumber" class="form-input" placeholder="2547XX XXX XXX" required>
                    <p class="form-hint">Format: 2547XXXXXXXX</p>
                </div>
                
                <div class="tournament-summary" style="background: var(--darker); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                    <p><strong>Tournament:</strong> <span id="paymentTournamentName"></span></p>
                    <p><strong>Entry Fee:</strong> <span id="paymentAmount" style="color: var(--primary); font-size: 1.3rem;"></span></p>
                </div>
                
                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                    <span class="loading hidden" id="paymentLoading"></span>
                    <span id="paymentBtnText">Pay with M-Pesa</span>
                </button>
                
                <button type="button" class="btn btn-outline" style="width: 100%; margin-top: 0.5rem;" onclick="closePaymentModal()">
                    Cancel
                </button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/tournaments.js"></script>
    <script src="js/mpesa.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadAllTournaments();
        });
    </script>
</body>
</html>
