<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - eFootball Pro Tournament</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">eFootball<span class="highlight">Pro</span></span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="tournaments.html">Tournaments</a></li>
            <li><a href="matches.html">Matches</a></li>
            <li><a href="wallet.html" class="active">Wallet</a></li>
        </ul>
        <div class="user-menu">
            <span class="username" id="walletUsername"></span>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <section class="section" style="margin-top: 6rem;">
        <div class="container">
            <div class="wallet-header">
                <h1 class="gradient-text" style="font-size: 3rem; font-family: var(--font-display);">My Wallet</h1>
                <div class="balance-card" style="background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 2rem; border-radius: 20px; text-align: center; margin: 2rem 0;">
                    <h2 style="font-family: var(--font-display); font-size: 3.5rem; margin: 0;" id="walletBalance">KES 0</h2>
                    <p style="font-size: 1.1rem; opacity: 0.9; margin: 0.5rem 0;">Available Balance</p>
                    <p style="font-size: 0.9rem; opacity: 0.7;">Min withdrawal: KES 100</p>
                </div>
            </div>

            <!-- Withdraw Form -->
            <div class="dashboard-card" style="max-width: 500px; margin: 0 auto;">
                <h2 style="text-align: center; margin-bottom: 2rem;">Withdraw to M-Pesa</h2>
                <form id="withdrawForm" onsubmit="requestWithdraw(event)">
                    <div class="form-group">
                        <label class="form-label">Amount (KES)</label>
                        <input type="number" id="withdrawAmount" class="form-input" min="100" step="50" required>
                        <p class="form-hint">Minimum KES 100. Processing fee: FREE</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">M-Pesa Number</label>
                        <input type="tel" id="mpesaNumber" class="form-input" placeholder="2547XX XXX XXX" pattern="254[17][0-9]{8}" required>
                        <p class="form-hint">Format: 2547XXXXXXXX</p>
                    </div>
                    <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                        <span class="loading hidden" id="withdrawLoading"></span>
                        Request Withdrawal
                    </button>
                </form>
            </div>

            <!-- Recent Transactions -->
            <div class="dashboard-card" style="margin-top: 3rem;">
                <h2>Recent Transactions</h2>
                <div id="transactionHistory">
                    <p style="text-align: center; color: var(--text-muted);">No transactions yet</p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script src="js/wallet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadWallet();
        });
    </script>
</body>
</html>
