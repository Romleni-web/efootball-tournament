<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Withdrawals - eFootball Pro Tournament</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">eFootball<span class="highlight">Pro</span></span>
            </div>
        </div>
        <div class="user-menu">
            <span>Admin</span>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <div class="container" style="margin-top: 6rem;">
        <h1 style="font-family: var(--font-display);">Withdrawal Requests</h1>
        <div id="withdrawalsList">
            <p style="text-align: center; padding: 4rem;">Loading...</p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        // Simple placeholder - admin monitors console.logs for withdrawals from /users/withdraw
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAuth();
            document.getElementById('withdrawalsList').innerHTML = `
                <div style="text-align: center; padding: 4rem; color: var(--text-muted);">
                    <p>Monitor server console/logs for withdrawal requests</p>
                    <p>Process manually via M-Pesa, then confirm with player</p>
                    <details>
                        <summary>Recent requests (from logs):</summary>
                        <p>Check backend console for "💸 Withdrawal Request" entries</p>
                    </details>
                </div>
            `;
        });
    </script>
</body>
</html>
