<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - eFootball Tournament</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">eFootball<span class="highlight">Pro</span></span>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <h1 class="form-title gradient-text">Create Account</h1>
        <form id="registerForm" onsubmit="register(event)">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
            </div>
            
            <div class="form-group">
                <label class="form-label">eFootball Team Name</label>
                <input type="text" id="teamName" class="form-input" placeholder="e.g., Galacticos FC" required>
                <p class="form-hint">This is the team you'll use in tournaments</p>
            </div>
            
            <button type="submit" class="btn btn-primary btn-large" style="width: 100%; margin-top: 1rem;">
                Create Account
            </button>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary);">Login here</a>
            </p>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
