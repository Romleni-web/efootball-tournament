<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Payments - eFootball Pro Tournament</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">eFootball<span class="highlight">Pro</span></span>
            </div>
        </div>
        <div class="user-menu">
            <span>Admin</span>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <div class="container" style="margin-top: 6rem; max-width: 1200px;">
        <h1 style="font-family: var(--font-display); text-align: center; margin-bottom: 3rem;">Payment Verification</h1>
        
        <div class="stats-row" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
            <div class="stat-card">
                <h3>Pending Payments</h3>
                <div class="value" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Today's Revenue</h3>
                <div class="value" id="todayRevenue">KES 0</div>
            </div>
            <div class="stat-card">
                <h3>Platform Fee (25%)</h3>
                <div class="value" id="platformFee">KES 0</div>
            </div>
        </div>

        <div class="payment-list" id="paymentsList">
            <div style="text-align: center; padding: 4rem; color: var(--text-muted);">
                Loading payments...
            </div>
        </div>
    </div>

    <!-- Payment Detail Modal -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal" style="max-width: 900px; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h2 id="modalTitle">Payment Details</h2>
                <button onclick="closePaymentModal()" class="btn-close">&times;</button>
            </div>
            <div id="modalContent">
                <!-- Dynamic content -->
            </div>
            <div style="padding: 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn btn-danger" onclick="rejectPayment(currentPaymentId)" id="rejectBtn">Reject</button>
                <button class="btn btn-primary" onclick="verifyPayment(currentPaymentId)" id="verifyBtn">Verify & Approve</button>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/admin-payments.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAuth();
            loadPendingPayments();
        });
    </script>
</body>
</html>
