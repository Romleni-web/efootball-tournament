<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches - eFootball Tournament</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">eFootball<span class="highlight">Pro</span></span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="tournaments.html">Tournaments</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
        <div class="user-menu">
            <span class="username"></span>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <section class="section" style="margin-top: 6rem;">
        <div class="container">
            <h1 class="section-title">Tournament Bracket</h1>
            
            <div class="bracket" id="tournamentBracket">
                <!-- Bracket generated dynamically -->
                <div style="text-align: center; color: var(--text-muted); padding: 4rem;">
                    Select a tournament to view bracket
                </div>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script>
        async function loadBracket() {
            const urlParams = new URLSearchParams(window.location.search);
            const tournamentId = urlParams.get('tournament');
            
            if (!tournamentId) return;
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/tournaments/${tournamentId}/bracket`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                // Generate bracket visualization
                const bracket = document.getElementById('tournamentBracket');
                bracket.innerHTML = '';
                
                data.rounds.forEach((round, roundIndex) => {
                    const roundDiv = document.createElement('div');
                    roundDiv.className = 'bracket-round';
                    roundDiv.innerHTML = `<h3 style="text-align: center; margin-bottom: 1rem; color: var(--primary);">Round ${roundIndex + 1}</h3>`;
                    
                    round.matches.forEach(match => {
                        roundDiv.innerHTML += `
                            <div class="match-card">
                                <div class="match-player ${match.winner === match.player1 ? 'winner' : ''}">
                                    <span>${match.player1}</span>
                                    <span>${match.score1 || '-'}</span>
                                </div>
                                <div class="match-player ${match.winner === match.player2 ? 'winner' : ''}">
                                    <span>${match.player2}</span>
                                    <span>${match.score2 || '-'}</span>
                                </div>
                            </div>
                        `;
                    });
                    
                    bracket.appendChild(roundDiv);
                });
                
            } catch (error) {
                console.error('Bracket load error:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadBracket();
        });
    </script>
</body>
</html>
