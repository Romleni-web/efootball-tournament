<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - eFootball Tournament</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">eFootball<span class="highlight">Pro</span></span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="tournaments.html">Tournaments</a></li>
            <li><a href="leaderboard.html" class="active">Leaderboard</a></li>
            <li class="auth-links">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="register.html" class="btn btn-primary">Register</a>
            </li>
        </ul>
        <div class="user-menu hidden">
            <span class="username"></span>
            <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <section class="section" style="margin-top: 6rem;">
        <div class="container">
            <h1 class="section-title">Global Leaderboard</h1>
            
            <div class="leaderboard-preview" style="margin-top: 2rem;">
                <div class="leaderboard-row header">
                    <div>Rank</div>
                    <div>Player</div>
                    <div>Points</div>
                    <div>Win Rate</div>
                </div>
                <div id="leaderboardBody">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script>
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_URL}/leaderboard`);
                const players = await response.json();
                
                const container = document.getElementById('leaderboardBody');
                container.innerHTML = players.map((p, index) => `
                    <div class="leaderboard-row">
                        <div class="rank ${index < 3 ? 'top' : ''}">${index + 1}</div>
                        <div class="player-info">
                            <div class="player-avatar">${p.username[0].toUpperCase()}</div>
                            <div>
                                <div style="font-weight: 700;">${p.username}</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">${p.teamName}</div>
                            </div>
                        </div>
                        <div style="font-family: var(--font-display); font-size: 1.3rem; color: var(--primary);">${p.points}</div>
                        <div>${p.winRate}%</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Leaderboard load error:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadLeaderboard();
        });
    </script>
</body>
</html>
